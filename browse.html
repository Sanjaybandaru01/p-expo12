<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RentHub - Browse Items</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f6f8;
}

/* NAVBAR */

.navbar{
    background:#111;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
}

.logo{
    display:flex;
    align-items:center;
    font-size:22px;
    font-weight:bold;
}

.logo-icon{
    width:35px;
    height:35px;
    margin-right:10px;
}

.logo span{
    color:#ff9800;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:25px;
}

.navbar a:hover{
    color:#ff9800;
}

/* PAGE TITLE */

.title{
    text-align:center;
    margin-top:30px;
}

/* PRODUCTS GRID */

.container{
    padding:40px;
}

.items{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

.card button{
    width:100%;
    padding:10px;
    background:#2c5364;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

</style>
</head>

<body>
